<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEIDENBILLG CORE</title>

<style>
:root {
    --bg:#050505;
    --accent:#ff3e3e;
    --text:#fff;
    --dim:#555;
}

body {
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:monospace;
}

/* SECTIONS */
section {
    min-height:100vh;
    padding:80px;
    border-bottom:1px solid #111;
}

/* NAV */
nav {
    position:fixed;
    top:0;
    width:100%;
    padding:20px;
    background:linear-gradient(to bottom, #000, transparent);
    display:flex;
    justify-content:space-between;
}

/* BUTTON */
button {
    background:black;
    border:1px solid var(--accent);
    color:white;
    padding:10px;
    cursor:pointer;
}
button:hover { background:var(--accent); }

/* LOGIN MODAL */
#login-modal {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
}

.box {
    border:1px solid var(--accent);
    padding:20px;
    width:300px;
}

/* DASHBOARD */
#dashboard {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    z-index:2000;
}

.sidebar {
    width:250px;
    border-right:1px solid #111;
    padding:20px;
}

.main {
    flex:1;
    padding:20px;
}

.flex { display:flex; }

/* CENSUS */
.bar {
    height:5px;
    background:#111;
}
.fill {
    height:100%;
    background:var(--accent);
}
</style>
</head>

<body>

<nav>
    <div onclick="openLogin()" style="cursor:pointer;">HEIDENBILLG</div>
    <div id="scroll-stat">0%</div>
</nav>

<!-- 🚀 SPACESHIP -->
<section>
<h1>HSA-13 WAVERIDER</h1>
<p>Interplanetary system. 72h Earth–Mars transfer.</p>

<div id="countdown"></div>
</section>

<!-- 🏛 STATE -->
<section>
<h1>THE STATE</h1>
<p>33 buildings. One node. Zero bureaucracy.</p>
</section>

<!-- 📊 CENSUS -->
<section>
<h1>CENSUS</h1>
<div id="census-num">0</div>
<div class="bar"><div id="census-bar" class="fill"></div></div>
</section>

<!-- 🔐 LOGIN -->
<div id="login-modal" class="flex">
<div class="box">
<input id="login-hid" placeholder="HID">
<input id="login-pass" type="password" placeholder="KEY">
<button onclick="login()">LOGIN</button>

<hr>

<input id="reg-name" placeholder="NAME">
<input id="reg-email" placeholder="EMAIL">
<input id="reg-role" placeholder="ROLE">
<button onclick="register()">GENERATE HID</button>

<div id="credentials"></div>

<button onclick="closeLogin()">CLOSE</button>
</div>
</div>

<!-- 🧠 DASHBOARD -->
<div id="dashboard">
<div class="flex">

<div class="sidebar">
<h3 id="user-hid"></h3>
<p id="user-name"></p>
<p id="user-role"></p>
<p id="user-credits"></p>
<button onclick="logout()">LOGOUT</button>
</div>

<div class="main">
<h2>NODE TERMINAL</h2>

<div id="log"></div>

<input id="msg" placeholder="Message">
<button onclick="sendMessage()">SEND</button>

<div id="messages"></div>
</div>

</div>
</div>

<script>
// =======================
// DATABASE
// =======================
let DB = JSON.parse(localStorage.getItem("HB_DB")) || {
    users:[],
    messages:[],
    census:0
};

function saveDB(){ localStorage.setItem("HB_DB", JSON.stringify(DB)); }

// =======================
// CORE
// =======================
const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

function generateHID(){
    let h="";
    for(let i=0;i<24;i++) h+=chars[Math.floor(Math.random()*chars.length)];
    return h;
}

function generatePass(){
    let p="";
    const c="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#";
    for(let i=0;i<16;i++) p+=c[Math.floor(Math.random()*c.length)];
    return p;
}

// =======================
// AUTH
// =======================
let currentUser=null;

function register(){
    let user={
        hid:generateHID(),
        pass:generatePass(),
        name:reg-name.value,
        email:reg-email.value,
        role:reg-role.value,
        credits:100
    };

    DB.users.push(user);
    DB.census++;
    saveDB();
    updateCensus();

    credentials.innerHTML=`HID:<br>${user.hid}<br>PASS:<br>${user.pass}`;
}

function login(){
    let u=DB.users.find(x=>x.hid===login-hid.value && x.pass===login-pass.value);
    if(!u) return alert("DENIED");

    currentUser=u;
    dashboard.style.display="block";
    login-modal.style.display="none";

    user-hid.innerText=u.hid;
    user-name.innerText=u.name;
    user-role.innerText=u.role;
    user-credits.innerText=u.credits;

    loadMessages();
}

function logout(){ location.reload(); }

// =======================
// MESSAGES
// =======================
function sendMessage(){
    let m={from:currentUser.hid,text:msg.value,time:new Date().toLocaleTimeString()};
    DB.messages.push(m);
    saveDB();
    msg.value="";
    loadMessages();
}

function loadMessages(){
    messages.innerHTML=DB.messages.map(m=>`[${m.time}] ${m.from}: ${m.text}`).join("<br>");
}

// =======================
// UI
// =======================
function openLogin(){ login-modal.style.display="flex"; }
function closeLogin(){ login-modal.style.display="none"; }

// =======================
// CENSUS
// =======================
function updateCensus(){
    census-num.innerText=DB.census;
    census-bar.style.width=(DB.census/100000*100)+"%";
}
updateCensus();

// =======================
// COUNTDOWN
// =======================
setInterval(()=>{
    let d=new Date("2028-04-01")-Date.now();
    let days=Math.floor(d/86400000);
    countdown.innerText=days+" DAYS";
},1000);

// =======================
// SCROLL
// =======================
window.onscroll=()=>{
    let s=(window.scrollY/(document.body.scrollHeight-window.innerHeight))*100;
    scroll-stat.innerText=Math.round(s)+"%";
};

</script>

</body>
</html>
