<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heidenbillg</title>
<style>
:root{
--bg:#ffffff;
--text:#111;
--accent:#0071e3;
--soft:#f5f5f7;
}
body{margin:0;font-family:-apple-system,system-ui;background:var(--bg);color:var(--text);overflow-x:hidden;}
section{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:40px;text-align:center;}
h1{font-size:clamp(2.5rem,6vw,5rem);margin:10px 0;}
p{max-width:500px;color:#666;}
button{margin:10px;padding:12px 24px;border-radius:20px;border:none;background:var(--accent);color:white;cursor:pointer;font-weight:600;}
button.secondary{background:#eaeaea;color:#000;}
nav{position:fixed;top:0;width:100%;display:flex;justify-content:space-between;padding:20px;background:rgba(255,255,255,0.8);backdrop-filter:blur(10px);}
#modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.3);display:none;justify-content:center;align-items:center;}
.box{background:white;padding:30px;border-radius:20px;width:300px;}
input{width:100%;padding:10px;margin:5px 0;border:1px solid #ddd;border-radius:10px;}
</style>
</head>
<body><nav>
<div>HEIDENBILLG</div>
<div onclick="openLogin()" style="cursor:pointer">Acceder</div>
</nav><!-- HERO --><section>
<h1>HSA-13 Waverider</h1>
<p>Sistema de transporte interplanetario. Transferencia Tierra–Marte en 72h.</p>
<button onclick="showInfo('nave')">Más info</button>
<button class="secondary" onclick="openLogin()">Solicitar HID</button>
</section><!-- DOCS --><section style="background:var(--soft)">
<h1>Documentación</h1>
<p>Acceso a Constitución y Códigos operativos.</p>
<button onclick="showInfo('docs')">Ver documentos</button>
</section><!-- CENSO --><section>
<h1 id="census">0</h1>
<p>Ciudadanos registrados</p>
</section><!-- LOGIN --><div id="modal">
<div class="box">
<h3>Acceso</h3>
<input id="hid" placeholder="HID">
<input id="pass" type="password" placeholder="Clave">
<button onclick="login()">Entrar</button>
<hr>
<h4>Crear</h4>
<input id="name" placeholder="Nombre">
<input id="email" placeholder="Email">
<button onclick="register()">Generar HID</button>
<div id="out"></div>
<button class="secondary" onclick="closeLogin()">Cerrar</button>
</div>
</div><script>
let DB = JSON.parse(localStorage.getItem("HB")) || {users:[],census:0};
function save(){localStorage.setItem("HB",JSON.stringify(DB));}

function generate(len,chars){let s="";for(let i=0;i<len;i++)s+=chars[Math.floor(Math.random()*chars.length)];return s;}

function register(){
let u={hid:generate(24,"ABCDEF0123456789"),pass:generate(12,"abcABC123"),name:name.value,email:email.value};
DB.users.push(u);DB.census++;save();
out.innerHTML="HID:<br>"+u.hid+"<br>Clave:<br>"+u.pass;
update();
}

function login(){
let u=DB.users.find(x=>x.hid===hid.value && x.pass===pass.value);
if(!u)return alert("Error");
alert("Bienvenido "+u.name);
closeLogin();
}

function update(){document.getElementById("census").innerText=DB.census;}
update();

function openLogin(){modal.style.display="flex";}
function closeLogin(){modal.style.display="none";}

function showInfo(type){
if(type==='nave') alert('HSA-13: Propulsión AV-E, 1g continuo, escudo de hafnio.');
if(type==='docs') alert('Constitución y Códigos disponibles.');
}
</script></body>
</html>
